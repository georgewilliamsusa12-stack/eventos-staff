<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | EVENTOS & STAFF</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
    font-family:Arial,Helvetica,sans-serif;
}

.hero{
    background:linear-gradient(rgba(0,51,153,.90),rgba(0,51,153,.90)),
    url("https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

.logo{
    width:120px;
    height:120px;
    margin:auto;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:55px;
    margin-bottom:20px;
}

.hero h1{
    font-weight:bold;
}

.formulario{
    max-width:800px;
    margin:-40px auto 40px;
}

.card{
    border:none;
    border-radius:18px;
}

.btn-enviar{
    background:#FFC107;
    color:#000;
    font-weight:bold;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:20px;
}

.btn-enviar:hover{
    background:#ffcf33;
}

footer{
    background:#003399;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<section class="hero">

<div class="logo">
🎪
</div>

<h1>EVENTOS & STAFF</h1>

<p>Formulario Oficial de Postulación</p>

</section>

<div class="container formulario">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
Registro de Aspirante
</h2>

<form action="https://formsubmit.co/georgewilliamsusa12@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Nueva Postulación EVENTOS & STAFF">
<input type="hidden" name="_template" value="table">

<div class="mb-3">
<label>Nombre Completo</label>
<input type="text" class="form-control" name="Nombre" required>
</div>

<div class="mb-3">
<label>Número de Cédula</label>
<input type="text" class="form-control" name="Cedula" required>
</div>

<div class="mb-3">
<label>Fecha de Nacimiento</label>
<input type="date" class="form-control" name="FechaNacimiento" required>
</div>

<div class="mb-3">
<label>Ciudad</label>
<input type="text" class="form-control" name="Ciudad" required>
</div>

<div class="mb-3">
<label>Dirección</label>
<input type="text" class="form-control" name="Direccion" required>
</div>

<div class="mb-3">
<label>WhatsApp</label>
<input type="text" class="form-control" name="WhatsApp" required>
</div>

<div class="mb-3">
<label>Correo Electrónico</label>
<input type="email" class="form-control" name="Correo" required>
</div>

<div class="mb-3">
<label>Cargo al que desea postularse</label>

<select class="form-select" name="Cargo" required>

<option value="">Seleccione...</option>

<option>Logística</option>

<option>Producción</option>

<option>Montaje</option>

<option>Protocolo</option>

<option>Atención al Cliente</option>

<option>Control de Acceso</option>

</select>

</div>

<div class="mb-3">
<label>Talla de Camiseta</label>

<select class="form-select" name="Talla" required>

<option value="">Seleccione...</option>

<option>XS</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>

</select>

</div>

<div class="mb-3">

<label>¿Tiene experiencia?</label>

<select class="form-select" name="Experiencia" required>

<option value="">Seleccione...</option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="form-check mb-4">

<input class="form-check-input" type="checkbox" required>

<label class="form-check-label">

Acepto el tratamiento de mis datos personales conforme a la legislación vigente.

</label>

</div>

<button class="btn-enviar">

ENVIAR POSTULACIÓN

</button>

</form>

</div>

</div>

<footer>

© 2026 EVENTOS & STAFF

</footer>

</body>
</html>
